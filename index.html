<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCANNER - BATELE VIDROS E ESQUADRIAS</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:Inter; background:#0b1220; color:#fff; }
.screen{display:none;padding:20px}
.screen.active{display:block}
input,button{padding:10px;margin:5px;width:100%}
button{cursor:pointer}
.card{background:#111a2e;padding:15px;border-radius:10px;margin-bottom:10px}
video{width:100%;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <h2>Login</h2>
  <input id="email" placeholder="email">
  <input id="pass" type="password" placeholder="senha">
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Cadastrar</button>
</div>

<!-- APP -->
<div id="app" class="screen">

  <h2>ScanVault</h2>
  <button onclick="logout()">Sair</button>

  <div class="card">
    <input id="scanInput" placeholder="Digite ou escaneie">
    <button onclick="doScan()">Registrar</button>
    <button onclick="startCamera()">📷 Abrir câmera</button>
    <video id="video"></video>
  </div>

  <div id="list"></div>
</div>

<script>
// ================= CONFIG =================
const GAS_URL = "https://script.google.com/macros/s/AKfycbz_MHvAXoirSRGwR_XvMJG4imBzLZPGVzg7B-SJee0-DRgB6eRZScDC62Dkx4fMoEOA/exec";

let user = null;
let scanner;
let scanning = false;

// ================= AUTH =================
function getUsers(){
  return JSON.parse(localStorage.getItem("users")||"[]");
}

function register(){
  const email=document.getElementById("email").value;
  const pass=document.getElementById("pass").value;

  let users=getUsers();
  if(users.find(u=>u.email===email)) return alert("Já existe");

  users.push({email,pass});
  localStorage.setItem("users",JSON.stringify(users));
  alert("Criado!");
}

function login(){
  const email=document.getElementById("email").value;
  const pass=document.getElementById("pass").value;

  let users=getUsers();
  let found=users.find(u=>u.email===email && u.pass===pass);

  if(!found) return alert("erro login");

  user=found;
  document.getElementById("login").classList.remove("active");
  document.getElementById("app").classList.add("active");

  load();
}

// ================= SCAN =================
function doScan(){
  const code=document.getElementById("scanInput").value;
  if(!code) return;

  const item={
    id:Date.now(),
    code,
    user:user.email,
    time:new Date().toISOString(),
    status:"pending"
  };

  saveLocal(item);
  sendGAS([item]);
  render();
}

function saveLocal(item){
  let data=JSON.parse(localStorage.getItem("items")||"[]");
  data.unshift(item);
  localStorage.setItem("items",JSON.stringify(data));
}

function load(){
  render();
}

function render(){
  let data=JSON.parse(localStorage.getItem("items")||"[]");
  let html="";

  data.forEach(i=>{
    html+=`
    <div class="card">
      <b>${i.code}</b><br>
      ${i.user}<br>
      ${i.status}
    </div>`;
  });

  document.getElementById("list").innerHTML=html;
}

// ================= GOOGLE SHEETS =================
async function sendGAS(items){
  if(GAS_URL.includes("https://script.google.com/macros/s/AKfycbz_MHvAXoirSRGwR_XvMJG4imBzLZPGVzg7B-SJee0-DRgB6eRZScDC62Dkx4fMoEOA/exec")) return;

  fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify({items}),
    headers:{"Content-Type":"application/json"}
  }).catch(()=>{});
}

// ================= CAMERA =================
function startCamera(){
  scanner=new ZXing.BrowserMultiFormatReader();

  scanner.decodeFromVideoDevice(
    null,
    "video",
    (result,err)=>{
      if(result && !scanning){
        scanning=true;
        document.getElementById("scanInput").value=result.text;
        stopCamera();
        doScan();
      }
    }
  );
}

function stopCamera(){
  if(scanner){
    scanner.reset();
  }
  scanning=false;
}

// ================= LOGOUT =================
function logout(){
  location.reload();
}
</script>

</body>
</html>
